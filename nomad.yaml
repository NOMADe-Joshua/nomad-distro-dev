services:
  upload_limit: 5000
  upload_members_group_search_enabled: true
keycloak:
  realm_name: "fairdi_nomad_test"
elastic:
  entries_index: "nomad_entries_v1_test"
  materials_index: "nomad_materials_v1_test"
mongo:
  db_name: "nomad_v1_test"
fs:
  tmp: '.volumes/test_fs/tmp'
  staging: '.volumes/test_fs/staging'
  public: '.volumes/test_fs/public'
plugins:
  entry_points:
    include: [
      "nomad_perotf.schema_packages:perotf_package",
      "perovskite_solar_cell_database:perovskite_solar_cell",
      "nomad_perotf.parsers:perotf_parser",
      "nomad_perotf.parsers:perotf_experiment_parser",
      "nomad_perotf.apps:perotf_voila_app"
    ]
